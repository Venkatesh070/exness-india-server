services:
  postgres:
    image: postgres:16-alpine
    container_name: exness-india-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exness_india
    volumes:
      - exness_india_pgdata:/var/lib/postgresql/data

volumes:
  exness_india_pgdata:
